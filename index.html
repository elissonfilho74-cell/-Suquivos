!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SUQUIVOS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff8f0;
    }

    header {
      background: #ff7a00;
      color: white;
      text-align: center;
      padding: 20px;
    }

    nav {
      background: #333;
      text-align: center;
      padding: 10px;
    }

    nav a {
      color: white;
      margin: 10px;
      text-decoration: none;
      font-weight: bold;
      cursor: pointer;
    }

    section {
      display: none;
      padding: 20px;
      text-align: center;
    }

    .ativo {
      display: block;
    }

    .cardapio {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .item {
      background: white;
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
      width: 200px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    .btn {
      margin-top: 10px;
      padding: 10px;
      background: #ff7a00;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    footer {
      background: #333;
      color: white;
      text-align: center;
      padding: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>🍹 SUQUIVOS</h1>
  <p>Sucos naturais e deliciosos</p>
</header>

<nav>
  <a onclick="mostrar('inicio')">Início</a>
  <a onclick="mostrar('cardapio')">Cardápio</a>
  <a onclick="mostrar('finalizar')">Finalizar</a>
</nav>

<!-- INÍCIO -->
<section id="inicio" class="ativo">
  <h2>Bem-vindo à SUQUIVOS</h2>
  <p>Somos especialistas em sucos naturais 🍇🍊🥭🍉</p>
</section>

<!-- CARDÁPIO -->
<section id="cardapio">
  <h2>Cardápio</h2>

  <div class="cardapio">
    <div class="item">
      <h3>Uva 🍇</h3>
      <p>R$ 7</p>
      <button class="btn" onclick="add('Uva',7)">Adicionar</button>
    </div>

    <div class="item">
      <h3>Laranja 🍊</h3>
      <p>R$ 6</p>
      <button class="btn" onclick="add('Laranja',6)">Adicionar</button>
    </div>

    <div class="item">
      <h3>Manga 🥭</h3>
      <p>R$ 7</p>
      <button class="btn" onclick="add('Manga',7)">Adicionar</button>
    </div>

    <div class="item">
      <h3>Melancia 🍉</h3>
      <p>R$ 5</p>
      <button class="btn" onclick="add('Melancia',5)">Adicionar</button>
    </div>
  </div>
</section>

<!-- FINALIZAR -->
<section id="finalizar">
  <h2>Finalizar Pedido</h2>

  <ul id="lista"></ul>

  <p><strong>Total: R$ <span id="total">0</span></strong></p>

  <button class="btn" onclick="finalizar()">Finalizar no WhatsApp</button>
</section>

<footer>
  <p>© 2026 SUQUIVOS</p>
</footer>

<script>
  let carrinho = [];
  let total = 0;

  function mostrar(secao){
    document.querySelectorAll("section").forEach(s => s.classList.remove("ativo"));
    document.getElementById(secao).classList.add("ativo");
  }

  function add(nome, preco){
    carrinho.push(nome);
    total += preco;
    atualizar();
  }

  function atualizar(){
    let lista = document.getElementById("lista");
    lista.innerHTML = "";

    carrinho.forEach(item => {
      let li = document.createElement("li");
      li.textContent = item;
      lista.appendChild(li);
    });

    document.getElementById("total").textContent = total;
  }

  function finalizar(){
    if(carrinho.length === 0){
      alert("Carrinho vazio!");
      return;
    }

    let msg = "Pedido SUQUIVOS:%0A";

    carrinho.forEach(item => {
      msg += "- " + item + "%0A";
    });

    msg += "Total: R$ " + total;

    window.open("https://wa.me/5599999999999?text=" + msg);
  }
</script>

</body>
</html
